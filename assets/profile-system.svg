<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1320" viewBox="0 0 1120 1320" role="img" aria-labelledby="title desc">
  <title id="title">nc98rajsc GitHub profile system display</title>
  <desc id="desc">Dark terminal style profile banner with status, location, focus, about me, tech stack, and mission terminal.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="58%" stop-color="#030303"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" x2="1">
      <stop offset="0" stop-color="#111"/>
      <stop offset=".18" stop-color="#d9d9d9"/>
      <stop offset=".5" stop-color="#fff"/>
      <stop offset=".82" stop-color="#d9d9d9"/>
      <stop offset="1" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" x2="1">
      <stop offset="0" stop-color="#111"/>
      <stop offset=".5" stop-color="#fff"/>
      <stop offset="1" stop-color="#111"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style><![CDATA[
      .mono { font-family: Consolas, "Courier New", monospace; }
      .thin { fill: #bdbdbd; }
      .dim { fill: #777; }
      .white { fill: #f4f4f4; }
      .green { fill: #22f66f; }
      .line { stroke: #555; stroke-width: 1; fill: none; }
      .fine { stroke: #2a2a2a; stroke-width: 1; fill: none; }
      .panel { fill: rgba(0,0,0,.42); stroke: #3b3b3b; stroke-width: 1; }
      .corner { stroke: #777; stroke-width: 1; fill: none; }
      .blink { animation: blink 1.05s steps(1,end) infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
    ]]></style>
  </defs>

  <rect width="1120" height="1320" fill="url(#bg)"/>

  <!-- star field -->
  <g opacity=".8">
    <circle cx="57" cy="78" r="1" fill="#d9d9d9"/><circle cx="121" cy="137" r="1" fill="#888"/>
    <circle cx="303" cy="64" r="1.2" fill="#666"/><circle cx="405" cy="112" r="1" fill="#aaa"/>
    <circle cx="589" cy="35" r="1" fill="#777"/><circle cx="712" cy="95" r="1" fill="#aaa"/>
    <circle cx="903" cy="79" r="1.2" fill="#777"/><circle cx="1014" cy="156" r="1" fill="#aaa"/>
    <circle cx="151" cy="257" r="1" fill="#aaa"/><circle cx="266" cy="329" r="1" fill="#666"/>
    <circle cx="444" cy="254" r="1.2" fill="#777"/><circle cx="608" cy="309" r="1" fill="#eee"/>
    <circle cx="781" cy="274" r="1" fill="#888"/><circle cx="1012" cy="303" r="1" fill="#aaa"/>
    <circle cx="74" cy="414" r="1" fill="#888"/><circle cx="350" cy="426" r="1" fill="#aaa"/>
    <circle cx="647" cy="433" r="1.2" fill="#777"/><circle cx="956" cy="421" r="1" fill="#999"/>
    <circle cx="185" cy="544" r="1" fill="#777"/><circle cx="512" cy="568" r="1" fill="#ddd"/>
    <circle cx="730" cy="539" r="1" fill="#777"/><circle cx="1044" cy="573" r="1" fill="#aaa"/>
  </g>

  <!-- top status -->
  <circle class="green pulse" cx="41" cy="35" r="5" filter="url(#glow)"/>
  <text class="mono thin" x="60" y="39" font-size="14" letter-spacing="3">SYSTEM ONLINE</text>
  <path class="line" d="M183 35 H373 L393 55" opacity=".9"/>
  <circle cx="393" cy="55" r="1.5" fill="#777"/>

  <text class="mono thin" x="790" y="39" font-size="14" letter-spacing="3">BUILDING * ITERATING * IMPROVING</text>

  <!-- hero -->
  <g text-anchor="middle">
    <text class="mono white" x="560" y="160" font-size="42" letter-spacing="12">nc98rajsc<tspan class="blink" fill="#aaa">|</tspan></text>
    <text class="mono thin" x="560" y="202" font-size="19" letter-spacing="5">build systems. iterate fast.</text>
    <text class="mono thin" x="560" y="232" font-size="18">-</text>
  </g>
  <g filter="url(#softGlow)">
    <line x1="560" y1="263" x2="560" y2="393" stroke="#fff" stroke-width="2"/>
    <line x1="558" y1="326" x2="562" y2="326" stroke="#fff" stroke-width="7"/>
    <ellipse cx="560" cy="417" rx="58" ry="17" fill="#fff" opacity=".28"/>
    <ellipse cx="531" cy="419" rx="34" ry="14" fill="#bbb" opacity=".18"/>
    <ellipse cx="590" cy="421" rx="36" ry="14" fill="#bbb" opacity=".18"/>
  </g>
  <path d="M15 445 C250 420, 870 420, 1105 445" stroke="url(#horizon)" stroke-width="2" fill="none"/>
  <path d="M16 446 C250 430, 870 430, 1105 446" stroke="#777" stroke-width="1" opacity=".32" fill="none"/>

  <!-- info row -->
  <line x1="31" y1="560" x2="1090" y2="560" stroke="#1d1d1d"/>
  <g transform="translate(55 487)">
    <circle cx="14" cy="14" r="17" fill="none" stroke="#333"/>
    <path class="fine" d="M-1 14 H29 M14 -3 C8 8,8 20,14 31 M14 -3 C20 8,20 20,14 31"/>
    <text class="mono dim" x="50" y="2" font-size="12" letter-spacing="2">LOCATION</text>
    <text class="mono white" x="50" y="31" font-size="17">Thailand</text>
  </g>
  <line x1="360" y1="475" x2="360" y2="538" stroke="#333"/>
  <g transform="translate(420 489)">
    <text class="mono dim" x="0" y="0" font-size="12" letter-spacing="2">FOCUS</text>
    <text class="mono white" x="0" y="29" font-size="17">Systems * Automation * Tools</text>
  </g>
  <line x1="785" y1="475" x2="785" y2="538" stroke="#333"/>
  <g transform="translate(845 489)">
    <text class="mono dim" x="0" y="0" font-size="12" letter-spacing="2">STATUS</text>
    <text class="mono white" x="0" y="29" font-size="17">Still building</text>
    <circle class="green pulse" cx="158" cy="23" r="4" filter="url(#glow)"/>
  </g>

  <!-- about panel -->
  <rect class="panel" x="31" y="586" width="1058" height="245" rx="8"/>
  <g transform="translate(112 613)" opacity=".75">
    <circle cx="122" cy="96" r="8" fill="#fff" filter="url(#glow)"/>
    <circle cx="122" cy="96" r="27" class="fine"/><circle cx="122" cy="96" r="42" class="fine"/>
    <circle cx="122" cy="96" r="57" class="fine"/><circle cx="122" cy="96" r="72" class="fine"/>
    <circle cx="122" cy="96" r="88" class="fine"/>
    <path class="line" d="M122 96 L231 96"/>
    <circle cx="32" cy="104" r="2.5" fill="#fff"/><circle cx="73" cy="167" r="2.5" fill="#fff"/>
    <circle cx="170" cy="101" r="2.5" fill="#fff"/><circle cx="232" cy="52" r="2.5" fill="#fff"/>
    <path class="corner" d="M-28 22 v-13 h13 M292 22 v-13 h-13 M-28 168 v13 h13 M292 168 v13 h-13"/>
  </g>
  <g transform="translate(472 638)">
    <text class="mono thin" x="0" y="0" font-size="14">&gt; ABOUT_ME</text>
    <text class="mono white" x="0" y="48" font-size="18">Builder from Thailand.</text>
    <text class="mono white" x="0" y="90" font-size="18">I build systems, automate things,</text>
    <text class="mono white" x="0" y="116" font-size="18">and turn ideas into real tools.</text>
    <text class="mono thin" x="0" y="160" font-size="18">_</text>
  </g>

  <!-- stack label -->
  <text class="mono thin" x="56" y="878" font-size="15">&gt; STACK</text>
  <path class="line" d="M145 873 H1010"/>
  <path class="line" d="M1008 873 l8 -8 l6 16 l7 -16 l8 16 l8 -8 h24"/>

  <!-- stack cards -->
  <g transform="translate(130 910)">
    <path class="corner" d="M0 27 V0 h27 M142 0 h27 v27 M0 92 v27 h27 M169 92 v27 h-27"/>
    <g transform="translate(31 20)" class="float">
      <rect x="10" y="2" width="65" height="40" rx="15" fill="#3776ab"/>
      <rect x="44" y="35" width="65" height="40" rx="15" fill="#ffd43b"/>
      <circle cx="30" cy="15" r="4" fill="#fff"/><circle cx="90" cy="62" r="4" fill="#333"/>
    </g>
    <text class="mono dim" x="84" y="150" text-anchor="middle" font-size="14" letter-spacing="2">PYTHON</text>
    <line x1="10" y1="176" x2="132" y2="176" stroke="#251cff"/><circle cx="134" cy="176" r="2.4" fill="#fff" filter="url(#glow)"/>
  </g>

  <g transform="translate(370 910)">
    <path class="corner" d="M0 27 V0 h27 M142 0 h27 v27 M0 92 v27 h27 M169 92 v27 h-27"/>
    <g transform="translate(48 20)" class="float">
      <path d="M0 0 h70 l-7 78 l-28 8 l-28 -8 z" fill="#e44d26"/>
      <path d="M35 7 h27 l-6 65 l-21 6 z" fill="#f16529"/>
      <text class="mono white" x="35" y="58" font-size="54" text-anchor="middle" font-weight="700">5</text>
    </g>
    <text class="mono dim" x="84" y="150" text-anchor="middle" font-size="14" letter-spacing="2">HTML</text>
    <line x1="10" y1="176" x2="132" y2="176" stroke="#ff5a1f"/><circle cx="134" cy="176" r="2.4" fill="#fff" filter="url(#glow)"/>
  </g>

  <g transform="translate(610 910)">
    <path class="corner" d="M0 27 V0 h27 M142 0 h27 v27 M0 92 v27 h27 M169 92 v27 h-27"/>
    <g transform="translate(48 20)" class="float">
      <path d="M0 0 h70 l-7 78 l-28 8 l-28 -8 z" fill="#1572b6"/>
      <path d="M35 7 h27 l-6 65 l-21 6 z" fill="#33a9dc"/>
      <text class="mono white" x="35" y="58" font-size="54" text-anchor="middle" font-weight="700">3</text>
    </g>
    <text class="mono dim" x="84" y="150" text-anchor="middle" font-size="14" letter-spacing="2">CSS</text>
    <line x1="10" y1="176" x2="132" y2="176" stroke="#1e84ff"/><circle cx="134" cy="176" r="2.4" fill="#fff" filter="url(#glow)"/>
  </g>

  <g transform="translate(850 910)">
    <path class="corner" d="M0 27 V0 h27 M142 0 h27 v27 M0 92 v27 h27 M169 92 v27 h-27"/>
    <g transform="translate(36 16)" class="float">
      <circle cx="48" cy="48" r="39" fill="#00007f"/>
      <circle cx="75" cy="27" r="10" fill="#fff"/><circle cx="98" cy="9" r="10" fill="#00007f"/>
      <circle cx="48" cy="48" r="48" fill="none" stroke="#555" stroke-dasharray="4 5"/>
      <text class="mono white" x="48" y="61" font-size="30" text-anchor="middle">Lua</text>
    </g>
    <text class="mono dim" x="84" y="150" text-anchor="middle" font-size="14" letter-spacing="2">LUA</text>
    <line x1="10" y1="176" x2="132" y2="176" stroke="#1313b8"/><circle cx="134" cy="176" r="2.4" fill="#fff" filter="url(#glow)"/>
  </g>

  <!-- terminal -->
  <rect class="panel" x="31" y="1120" width="1058" height="224" rx="8"/>
  <line x1="31" y1="1164" x2="1089" y2="1164" stroke="#292929"/>
  <circle cx="65" cy="1143" r="6" fill="#555"/><circle cx="86" cy="1143" r="6" fill="#555"/><circle cx="107" cy="1143" r="6" fill="#555"/>
  <text class="mono dim" x="137" y="1147" font-size="13" letter-spacing="2">TERMINAL</text>
  <g transform="translate(60 1195)">
    <text class="mono green" x="0" y="0" font-size="15">$ whoami</text>
    <text class="mono white" x="0" y="26" font-size="15">&gt; nc98rajsc</text>
    <text class="mono green" x="0" y="52" font-size="15">$ status</text>
    <text class="mono white" x="0" y="78" font-size="15">&gt; coding || learning || building</text>
    <text class="mono green" x="0" y="104" font-size="15">$ mission</text>
    <text class="mono white" x="0" y="130" font-size="15">&gt; create impact through code</text>
    <text class="mono green" x="0" y="162" font-size="15">$ <tspan class="blink" fill="#eee">█</tspan></text>
  </g>

  <!-- simplified world scan -->
  <g transform="translate(470 1185)" opacity=".7">
    <path d="M0 95 C120 55, 265 58, 405 91 C480 109, 548 111, 630 66" stroke="url(#scan)" fill="none" opacity=".65"/>
    <path d="M0 138 C122 106, 239 103, 364 125 C481 146, 552 129, 629 91" stroke="#777" fill="none" opacity=".35"/>
    <g fill="#aaa">
      <circle cx="77" cy="28" r="1.6"/><circle cx="86" cy="35" r="1.6"/><circle cx="96" cy="30" r="1.6"/><circle cx="110" cy="44" r="1.6"/>
      <circle cx="121" cy="57" r="1.6"/><circle cx="137" cy="69" r="1.6"/><circle cx="153" cy="83" r="1.6"/><circle cx="167" cy="103" r="1.6"/>
      <circle cx="213" cy="33" r="1.6"/><circle cx="228" cy="39" r="1.6"/><circle cx="242" cy="49" r="1.6"/><circle cx="257" cy="68" r="1.6"/>
      <circle cx="278" cy="89" r="1.6"/><circle cx="302" cy="104" r="1.6"/><circle cx="331" cy="87" r="1.6"/><circle cx="348" cy="62" r="1.6"/>
      <circle cx="426" cy="53" r="1.6"/><circle cx="445" cy="47" r="1.6"/><circle cx="469" cy="49" r="1.6"/><circle cx="492" cy="61" r="1.6"/>
      <circle cx="516" cy="74" r="1.6"/><circle cx="542" cy="91" r="1.6"/><circle cx="568" cy="112" r="1.6"/><circle cx="598" cy="78" r="1.6"/>
    </g>
    <circle cx="531" cy="83" r="4" fill="#fff" filter="url(#glow)"/>
  </g>
</svg>
