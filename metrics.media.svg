<svg xmlns="http://www.w3.org/2000/svg" width="420" height="520" viewBox="0 0 420 520" role="img" aria-label="Media metrics setup placeholder">
  <style>
    .bg { fill: #0d1117; }
    .border { fill: none; stroke: #30363d; stroke-width: 1; }
    .title { fill: #58a6ff; font: 600 18px Arial, sans-serif; }
    .text { fill: #8b949e; font: 14px Arial, sans-serif; }
    .muted { fill: #6e7681; font: 12px Arial, sans-serif; }
    .box { fill: #161b22; stroke: #30363d; }
    .accent { fill: #238636; }
  </style>
  <rect class="bg" width="420" height="520" rx="8" />
  <rect class="border" x="0.5" y="0.5" width="419" height="519" rx="8" />
  <text class="title" x="24" y="42">Media metrics</text>
  <text class="text" x="24" y="74">AniList and music panel</text>
  <text class="muted" x="24" y="104">Set repo variables to make this personal.</text>
  <rect class="box" x="24" y="136" width="372" height="96" rx="6" />
  <text class="text" x="42" y="170">ANILIST_USER</text>
  <text class="muted" x="42" y="198">Your AniList username for favorites and characters.</text>
  <rect class="box" x="24" y="256" width="372" height="96" rx="6" />
  <text class="text" x="42" y="290">MUSIC_PLAYLIST</text>
  <text class="muted" x="42" y="318">An Apple, Spotify, or YouTube Music embed playlist URL.</text>
  <circle class="accent" cx="42" cy="398" r="5" />
  <text class="muted" x="58" y="403">The workflow will overwrite this file after setup.</text>
</svg>
