name: Profile Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: General profile metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.general.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: q0HtHHftAS
          base: header
          base_indepth: yes
          config_timezone: Asia/Bangkok
          config_order: base.header, isocalendar, languages
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom: q0HtHHftAS/Roblox-Auto-Rejoin-windows@main
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_ignored: tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot, vue, ejs
          plugin_languages_limit: 7
          plugin_topics: no
          plugin_notable: no
          plugin_discussions: no
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile metrics"

      - name: Media metrics with AniList and music
        if: ${{ vars.ANILIST_USER != '' && vars.MUSIC_PLAYLIST != '' }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.personal.svg
          token: NOT_NEEDED
          base: ""
          config_timezone: Asia/Bangkok
          config_order: anilist, music
          plugin_anilist: yes
          plugin_anilist_user: ${{ vars.ANILIST_USER }}
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
          plugin_music: yes
          plugin_music_playlist: ${{ vars.MUSIC_PLAYLIST }}
          plugin_music_limit: 9
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile media metrics"

      - name: Media metrics with AniList only
        if: ${{ vars.ANILIST_USER != '' && vars.MUSIC_PLAYLIST == '' }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.personal.svg
          token: NOT_NEEDED
          base: ""
          config_timezone: Asia/Bangkok
          plugin_anilist: yes
          plugin_anilist_user: ${{ vars.ANILIST_USER }}
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile media metrics"

      - name: Media metrics with music only
        if: ${{ vars.ANILIST_USER == '' && vars.MUSIC_PLAYLIST != '' }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.personal.svg
          token: NOT_NEEDED
          base: ""
          config_timezone: Asia/Bangkok
          plugin_music: yes
          plugin_music_playlist: ${{ vars.MUSIC_PLAYLIST }}
          plugin_music_limit: 9
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile media metrics"
